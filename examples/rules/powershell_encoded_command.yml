title: PowerShell Encoded Command
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: >
  Detects PowerShell launched with -EncodedCommand / -enc,
  a common post-exploitation technique to hide payloads.
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    EventID: 4688
    CommandLine|contains:
      - '-EncodedCommand'
      - ' -enc '
      - ' -Enc '
  condition: selection
level: medium
